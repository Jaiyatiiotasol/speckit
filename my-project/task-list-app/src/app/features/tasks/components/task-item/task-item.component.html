<div class="task-item-container" [class.completed]="task().completed" [class.editing]="isEditing()" [id]="'task-item-' + task().id">
  <div class="checkbox-container">
    <input
      type="checkbox"
      [checked]="task().completed"
      (change)="onToggle()"
      [id]="'task-check-' + task().id"
      aria-label="Toggle completion state"
      class="task-checkbox"
    />
    <label [for]="'task-check-' + task().id" class="checkbox-label"></label>
  </div>

  <div class="task-content">
    @if (!isEditing()) {
      <span
        class="task-title"
        [class.completed]="task().completed"
        [id]="'task-title-text-' + task().id"
      >
        {{ task().title }}
      </span>
    } @else {
      <input
        #editInput
        type="text"
        [(ngModel)]="editValue"
        (keydown.enter)="onSaveEdit()"
        (blur)="onSaveEdit()"
        (keydown.escape)="onCancelEdit()"
        [id]="'task-edit-input-' + task().id"
        aria-label="Edit task title"
        class="task-edit-input"
        maxlength="200"
      />
    }
  </div>

  <div class="actions-container">
    @if (!isEditing()) {
      <button
        type="button"
        (click)="onStartEdit()"
        [id]="'task-edit-btn-' + task().id"
        aria-label="Edit task"
        class="action-btn edit-btn"
      >
        <!-- Pencil SVG Icon -->
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
      </button>
    }

    <button
      type="button"
      (click)="onDelete()"
      [id]="'task-delete-btn-' + task().id"
      aria-label="Delete task"
      class="action-btn delete-btn"
    >
      <!-- Trash SVG Icon -->
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    </button>
  </div>
</div>
