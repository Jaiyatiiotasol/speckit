<div class="task-list-container" id="task-list-container">
  @if (filteredTasks().length > 0) {
    <div class="task-items-list" id="task-items-list">
      @for (task of filteredTasks(); track task.id) {
        <app-task-item [task]="task"></app-task-item>
      }
    </div>
  } @else {
    <div class="empty-state" id="task-list-empty-state">
      <!-- Empty State Icon -->
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
      <p class="empty-text">No tasks matching this filter</p>
    </div>
  }
</div>
