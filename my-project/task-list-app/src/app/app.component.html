<div class="app-container">
  <header class="app-header">
    <h1 class="app-title">TaskFlow</h1>
    <p class="app-subtitle">Elevate your daily productivity</p>
  </header>

  <main class="app-card">
    <app-add-task></app-add-task>
    <app-task-list></app-task-list>

    @if (hasTasks()) {
      <app-task-footer></app-task-footer>
    }
  </main>

  <footer class="app-credits">
    <p>Double-click is not required. Click the pencil to edit. Escape to cancel.</p>
  </footer>
</div>
